{% extends "base.html" %}
{% load static %}

{% block content %}
    <link rel="stylesheet" href="{% static 'css/contact.css'%}">
    <link rel="stylesheet" href="{% static 'responsive/contact.css'%}">


    <main>
        <section class="contact">
            <h1>Contactez-nous?</h1>
            <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Quis temporibus </p>

            <div class="formulaire">
                <div class="infos-name">

                    <div class="form-item">
                        <label for="First-name">Prenom</label><br>
                        <input type="text" id="First-name">
                    </div>

                    <div class="form-item">
                        <label for="last-name">Nom</label><br>
                        <input type="text" id="last-name">
                    </div>
                    
                </div>
                <div class="form-item">
                    <label for="email">Email</label><br>
                    <input type="email" id="email">
                </div>

                <div class="form-item">
                    <label for="number">Numero de telephone</label><br>
                    <input type="number" id="number">
                </div>

                <div class="form-item">
                    <label for="msg">Message</label><br>
                    <textarea name="msg" id="msg"></textarea>
                </div>

                <div class="form-btn">
                    <i class="fa-solid fa-envelope"></i>
                    <a href="">Envoyer</a>
                </div>
                
            </div>
        </section>

        <section class="card-infos">
            <div class="infos-item">
                <i class="fa-solid fa-phone"></i>
                <h2>telephone</h2>
                <P>+221 XXX XX XX</P>
            </div>

            <div class="infos-item">
                <i class="fa-solid fa-envelope"></i>
                <h2>Email</h2>
                <P>contact@startbuffet.com</P>
            </div>

            <div class="infos-item">
                <i class="fa-solid fa-location-dot"></i>
                <h2>Adresse</h2>
                <P>Dakar, Senegal</P>
            </div>  
        </section>
    </main>
    

{% endblock  %}
